[colors]
#background = #1d2021
#background = #2e3440
background = #aa000000
foreground-alt = ${xrdb:color7:#000}
foreground = #C5C8C6
alert = ${xrdb:color3:#222}
green = #98971a
#yellow = #d79921
blue = #458588
purple = #b16286
aqua = #689d6a
red = #fb4934
black = #000000
b = #1d2021

[bar/bar]
width = 100%
height = 21pt
radius = 6
bottom = false

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 5pt
border-color = #00000000

padding-left = 0
padding-right = 1
module-margin = 1

#separator = |
#separator-foreground = ${colors.disabled}

#font-0 = monospace;2
font-0 = "Hack Nerd Font:size=10;2"

modules-left = round-left xwindow
modules-center = xworkspaces
modules-right = htb eth0 htb_target pulseaudio
#filesystem, htb , eth
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

#tray-position = center
#tray-background = ${colors.bg}

# –•–Ķ—Ä–Ĺ—Ź
tray-position = center
tray-offset-x = 250pt
tray-offset-y = 0pt
#tray-padding = 5


; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/round-left]
type = custom/text
content = " Ôąé "
content-foreground = ${colors.blue}
content-font = 3 
content-padding = 0
content-margin = 0

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.blue}

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

#label-mounted = %{}Óę¨ %mountpoint%%{F-} %percentage_used%%
label-mounted = Óę¨ %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/wireless-network]
type = internal/network
interface = wlp3s0
interval = 3.0

format-connected-prefix = " "

format-connected-background = ${colors.background}
format-connected = "   <ramp-signal> <label-connected>  "
format-connected-underline = ${colors.underscore}
label-connected =

format-disconnected = " no wifi :( "
format-disconnected-background = ${colors.background-unf}
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
label-disconnected-foreground = ${colors.foreground-alt}

ramp-signal-0 = "  Ôáę  0%"
ramp-signal-1 = "  Ôáę  25%"
ramp-signal-2 = "  Ôáę  50%"
ramp-signal-3 = "  Ôáę  75%"
ramp-signal-4 = "  Ôáę  100%"
ramp-signal-foreground = ${colors.foreground-alt}

[module/htb_target]
type = custom/script
interval = 2
exec = ~/.config/bin/htb_target.sh


[module/htb]
type = custom/script
interval = 2
exec = ~/.config/bin/htb.sh

[module/eth0]
type = custom/script
interval = 2
exec = ~/.config/bin/eth.sh

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "‚ô™ "
#format-volume-prefix-foreground = ${colors.primary}
format-volume-prefix-foreground = ${colors.green}

format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔÖ¨ "
format-prefix-foreground = ${colors.purple}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ÓČ¶ "
format-prefix-foreground = ${colors.aqua}
formant-foreground = ${colors.foreground}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
format=prefix = "ůįąÄ "
label-connected = ůįąÄ  %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}
format-prefix = "ůĪĎí "
format-prefix-foreground = ${colors.red}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
